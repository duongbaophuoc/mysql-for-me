apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: default
  labels:
    app: mysql
    component: database
type: Opaque
# ─── Values are base64-encoded / Giá trị được mã hóa base64 ────────────────
# To encode: echo -n 'your_password' | base64
# To decode: echo 'encoded' | base64 -d
stringData:
  # Root password / Mật khẩu root
  # ⚠️  Change before production! / Thay đổi trước khi dùng production!
  MYSQL_ROOT_PASSWORD: "change_me_in_production"

  # Application user / User ứng dụng
  MYSQL_USER:     "app_user"
  MYSQL_PASSWORD: "app_secure_password_here"

  # Replication user / User sao chép
  REPLICATION_USER:     "replicator"
  REPLICATION_PASSWORD: "repl_secure_password_here"

  # Monitoring user / User giám sát
  EXPORTER_USER:     "exporter"
  EXPORTER_PASSWORD: "exporter_secure_password_here"

---
# ─── How to use with kubectl / Cách dùng với kubectl ──────────────────────────
# Create from this file (dev only):
#   kubectl apply -f mysql-secret.yaml
#
# PRODUCTION: use Vault, AWS Secrets Manager, or sealed-secrets instead
# PRODUCTION: dùng Vault, AWS Secrets Manager, hoặc sealed-secrets thay thế
#
# Example with Vault injection:
#   annotations:
#     vault.hashicorp.com/agent-inject: "true"
#     vault.hashicorp.com/role: "mysql"
#     vault.hashicorp.com/agent-inject-secret-config: "secret/mysql/config"
