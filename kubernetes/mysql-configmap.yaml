apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: default
  labels:
    app: mysql
    component: database
data:
  my.cnf: |
    [mysqld]
    # ── Server Identity / Danh Tính Server ──────────────────────────────────
    server-id              = 1
    default-time-zone      = '+00:00'

    # ── Character Set / Bộ Ký Tự ───────────────────────────────────────────
    character-set-server   = utf8mb4
    collation-server       = utf8mb4_unicode_ci

    # ── InnoDB Engine / Động Cơ InnoDB ─────────────────────────────────────
    innodb_buffer_pool_size           = 2G
    innodb_buffer_pool_instances      = 2
    innodb_flush_log_at_trx_commit    = 1
    innodb_flush_method               = O_DIRECT
    innodb_file_per_table             = ON
    innodb_redo_log_capacity          = 1073741824  # 1GB
    innodb_io_capacity                = 2000
    innodb_io_capacity_max            = 4000

    # ── Binary Logging (Replication/PITR) / Nhật Ký Nhị Phân ───────────────
    log-bin                = mysql-bin
    binlog-format          = ROW
    binlog_row_image       = MINIMAL
    sync-binlog            = 1
    binlog_expire_logs_seconds = 604800
    gtid-mode              = ON
    enforce-gtid-consistency = ON

    # ── Connections / Kết Nối ─────────────────────────────────────────────
    max_connections        = 500
    wait_timeout           = 600
    interactive_timeout    = 600
    max_allowed_packet     = 64M

    # ── Slow Query Log / Nhật Ký Truy Vấn Chậm ────────────────────────────
    slow_query_log         = ON
    slow_query_log_file    = /var/log/mysql/slow.log
    long_query_time        = 1
    log_queries_not_using_indexes = ON

    # ── Performance Schema ─────────────────────────────────────────────────
    performance_schema     = ON
