apiVersion: 1

providers:
  - name: MySQL Infrastructure Dashboards
    orgId: 1
    folder: MySQL
    folderUid: mysql-folder
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
