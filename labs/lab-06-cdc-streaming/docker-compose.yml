version: "3.9"

# =============================================================================
# Lab 06: CDC Streaming Stack / Stack CDC Streaming
# MySQL + Kafka + Zookeeper + Kafka Connect + Debezium + Kafka UI
# =============================================================================

networks:
  cdc-net:
    driver: bridge

volumes:
  mysql-cdc-data:
  kafka-data:

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-cdc
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: shop_db
    ports:
      - "3316:3306"
    volumes:
      - mysql-cdc-data:/var/lib/mysql
      - ../../docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - cdc-net
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --binlog-row-image=FULL
      --gtid-mode=ON
      --enforce-gtid-consistency=ON

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper-cdc
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - cdc-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-cdc
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - cdc-net

  kafka-connect:
    image: debezium/connect:2.5
    container_name: kafka-connect-cdc
    depends_on: [kafka, mysql]
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: "1"
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
    networks:
      - cdc-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-cdc
    depends_on: [kafka]
    ports:
      - "9000:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - cdc-net
